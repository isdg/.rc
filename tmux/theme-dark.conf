# tmux dark theme — sourced by .tmux.conf based on ~/.config/isg/theme.
# Keep in sync with theme-light.conf. Re-source ~/.tmux.conf to repaint.
set -g status-style "bg=default,fg=#c0c0c0"
set -g status-left "[#S]#{?client_prefix,#[fg=#ffffff#,bold]*#[default] ,  }"
set -g window-status-style "bg=default,fg=#a6a6a6"
set -g window-status-current-style "bg=default,fg=#ffffff,bold"
set -g status-left-style "bg=default,fg=#c0c0c0"
set -g status-right-style "bg=default,fg=#c0c0c0"
set -g message-style "bg=default,fg=#e6e6e6"
set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=#777777"
