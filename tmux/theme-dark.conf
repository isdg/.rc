# tmux dark theme — sourced by .tmux.conf based on ~/.config/isg/theme.
# Keep in sync with theme-light.conf. Re-source ~/.tmux.conf to repaint.
set -g status-style "bg=default,fg=#999999"
set -g status-left "[#S]#{?client_prefix,#[fg=#cccccc#,bold]*#[default] ,  }"
set -g window-status-style "bg=default,fg=#888888"
set -g window-status-current-style "bg=default,fg=#cccccc,bold"
set -g status-left-style "bg=default,fg=#999999"
set -g status-right-style "bg=default,fg=#999999"
set -g message-style "bg=default,fg=#bbbbbb"
set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=#666666"
