set -g mouse on
set -g history-limit 100000

# Truecolor passthrough: without this tmux quantizes 24-bit color to its
# 256-palette, shifting vim/bat hex colors (most visible in fzf previews).
set -g default-terminal "tmux-256color"
set -as terminal-features ',*:RGB'

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Auto window names: bare command by default, but append the active pane's
# directory basename ONLY for (n)vim, so many editors are distinguishable
# (nvim:dotfiles, nvim:feed) while shells etc. stay bare (zsh, claude).
# #{m:*vim,...} matches vim/nvim/gvim; #{?cond,then,else} picks the suffix.
setw -g automatic-rename-format '#{pane_current_command}#{?#{m:*vim,#{pane_current_command}},:#{b:pane_current_path},}'

setw -g mode-keys vi
set -g set-clipboard on
# Advertise OSC 52 clipboard support for every terminal so tmux emits it on
# copy (Ghostty handles it locally and over SSH). Without this tmux won't send
# OSC 52 unless the attached terminal's terminfo declares the Ms capability.
set -as terminal-features ',*:clipboard'

bind & if-shell -F "#{==:#{window_index},1}" \
  "kill-window" \
  "select-window -t :- ; kill-window -t :+"
bind x kill-pane
bind X confirm-before -p "kill session #S? (y/n)" kill-session

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -a -c "#{pane_current_path}"
bind C command-prompt -p "new session name:" "new-session -s '%%' -c '~'"

bind n previous-window
bind p next-window

# prefix s / prefix w: choose-tree with Alt-letter fast-access. -K maps #{line}
# (0-based row) to M-a..M-z, then M-A..M-Z past 26 (52 total). Using the Alt
# modifier means zero clashes: plain h/j/k/l still navigate and x/f/m/n/t/etc
# stay as choose-tree commands, while M-<letter> jumps straight to an item.
bind s choose-tree -Zs -NN -K "#{?#{e|<:#{line},26},M-#{a:#{e|+:#{line},97}},#{?#{e|<:#{line},52},M-#{a:#{e|+:#{line},39}},}}"
bind w choose-tree -Zw -K "#{?#{e|<:#{line},26},M-#{a:#{e|+:#{line},97}},#{?#{e|<:#{line},52},M-#{a:#{e|+:#{line},39}},}}"

# copy-selection (no pipe) + set-clipboard on => tmux emits OSC 52 to the
# outer terminal, so the selection lands in the *local* Mac clipboard whether
# tmux runs locally or on a remote SSH host. No pbcopy/xclip needed.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-no-clear
bind -T copy-mode-vi Enter send -X copy-selection-no-clear
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-no-clear

# --- theme: dark/light, selected from ~/.config/isg/theme ---
# All colored styles live in tmux/theme-{dark,light}.conf (incl. status-left,
# whose prefix `*` color is theme-specific). if-shell picks one at load; after
# toggle_theme.sh flips the mode file, re-source ~/.tmux.conf to repaint.
# Prefix indicator: a bold * is appended after the session name's ] while tmux
# waits for the next key; it eats one trailing space so the list never shifts.
# default status-left-length is 10, which truncates longer session names; raise
# it so the gap before window 1 survives (not theme-dependent, kept here).
set -g status-left-length 40
# Right side: keep tmux's default pane-title display, only swap the date to
# ISO style (matches nvim <leader>nt, without seconds). status-left is untouched.
set -g status-right-length 60
set -g status-right "\"#{=21:pane_title}\" isg %Y-%m-%d %H:%M %z"
set -g status-interval 5
# Window list: current window marked *, last-chosen window (prefix l) marked ~.
set -g window-status-current-format "#I:#W*"
set -g window-status-format         "#I:#W#{?window_last_flag,~,}"
if-shell '[ "$(cat "${XDG_CONFIG_HOME:-$HOME/.config}/isg/theme" 2>/dev/null)" = dark ]' \
  'source-file ~/.dotfiles/tmux/theme-dark.conf' \
  'source-file ~/.dotfiles/tmux/theme-light.conf'

# --- plugins (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# orchbus: prefix o -> cockpit popup to triage/approve all Claude Code sessions
# from one window (scans panes running `claude`, acts via send-keys).
# https://github.com/isdg/orchbus
set -g @plugin 'isdg/orchbus'
# omni: prefix W/a/P/j -> fzf-backed window jump, content search, and pane
# scrollback capture (into less/nvim).
# https://github.com/isdg/omni
set -g @plugin 'isdg/omni'

run '~/.tmux/plugins/tpm/tpm'
