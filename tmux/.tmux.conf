set -g mouse on
set -g history-limit 100000

# Truecolor passthrough: without this tmux quantizes 24-bit color to its
# 256-palette, shifting vim/bat hex colors (most visible in fzf previews).
set -g default-terminal "tmux-256color"
set -as terminal-features ',*:RGB'

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Auto window names: bare command by default, but append the open file ONLY for
# (n)vim, so buffers are distinguishable (nvim:init.lua, nvim:.tmux.conf) while
# shells etc. stay bare (zsh, claude). nvim publishes its current filename as the
# pane title (set title + titlestring=%t, see nvim options.lua), which tmux reads
# as #{pane_title}. #{m:*vim,...} matches vim/nvim/gvim; #{?cond,then,else} picks.
setw -g automatic-rename-format '#{pane_current_command}#{?#{m:*vim,#{pane_current_command}},:#{pane_title},}'

setw -g mode-keys vi
set -g set-clipboard on
# Advertise OSC 52 clipboard support for every terminal so tmux emits it on
# copy (Ghostty handles it locally and over SSH). Without this tmux won't send
# OSC 52 unless the attached terminal's terminfo declares the Ms capability.
set -as terminal-features ',*:clipboard'

bind & if-shell -F "#{==:#{window_index},1}" \
  "kill-window" \
  "select-window -t :- ; kill-window -t :+"
bind x kill-pane
bind X confirm-before -p "kill session #S? (y/n)" kill-session

bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -a -c "#{pane_current_path}"
bind C command-prompt -p "new session name:" "new-session -s '%%' -c '~'"

bind n previous-window
bind p next-window

# prefix r / prefix R: rename window / pane title. `r` is a shorter alias for the
# default `,` (rename-window); it turns off automatic-rename for that window so
# the manual name sticks. `R` sets pane_title, which feeds automatic-rename-format
# and status-right. Both prefill the current name so it's an edit, not a retype.
# For (n)vim panes the editor keeps rewriting pane_title, so `R` is most useful
# for shells/REPLs.
bind r command-prompt -I "#{window_name}" -p "window name:" "rename-window '%%'"
bind R command-prompt -I "#{pane_title}" -p "pane title:" "select-pane -T '%%'"

# prefix s / prefix w: choose-tree with Alt-letter fast-access. -K maps #{line}
# (0-based row) to M-a..M-z, then M-A..M-Z past 26 (52 total). Using the Alt
# modifier means zero clashes: plain h/j/k/l still navigate and x/f/m/n/t/etc
# stay as choose-tree commands, while M-<letter> jumps straight to an item.
# -O name sorts sessions/windows alphabetically by default (vs index); toggle
# in-mode with O, reverse with r.
bind s choose-tree -Zs -NN -O name -K "#{?#{e|<:#{line},26},M-#{a:#{e|+:#{line},97}},#{?#{e|<:#{line},52},M-#{a:#{e|+:#{line},39}},}}"
bind w choose-tree -Zw -O name -K "#{?#{e|<:#{line},26},M-#{a:#{e|+:#{line},97}},#{?#{e|<:#{line},52},M-#{a:#{e|+:#{line},39}},}}"

# copy-selection (no pipe) + set-clipboard on => tmux emits OSC 52 to the
# outer terminal, so the selection lands in the *local* Mac clipboard whether
# tmux runs locally or on a remote SSH host. No pbcopy/xclip needed.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-no-clear
bind -T copy-mode-vi Enter send -X copy-selection-no-clear
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-no-clear

# --- theme: dark/light, selected from ~/.config/isg/theme ---
# All colored styles live in tmux/theme-{dark,light}.conf (incl. status-left,
# whose prefix `*` color is theme-specific). if-shell picks one at load; after
# toggle_theme.sh flips the mode file, re-source ~/.tmux.conf to repaint.
# Prefix indicator: a bold * is appended after the session name's ] while tmux
# waits for the next key; it eats one trailing space so the list never shifts.
# default status-left-length is 10, which truncates longer session names; raise
# it so the gap before window 1 survives (not theme-dependent, kept here).
set -g status-left-length 40
# Right side: keep tmux's default pane-title display, only swap the date to
# ISO style (matches nvim <leader>nt, without seconds). status-left is untouched.
set -g status-right-length 60
set -g status-right "\"#{=21:pane_title}\" isg %Y-%m-%d %H:%M %z"
set -g status-interval 5
# Window list: current window marked *, last-chosen window (prefix l) marked ~.
set -g window-status-current-format "#I:#W*"
set -g window-status-format         "#I:#W#{?window_last_flag,~,}"
# Resolved and applied inside one run-shell script rather than a bare
# $ISG_DOTFILES expansion: tmux's own global environment is captured once at
# server start and never gets zsh's `export ISG_DOTFILES` (that only lives in
# interactive shells), so `source-file "$ISG_DOTFILES/..."` here silently
# no-ops ("No such file or directory: /tmux/theme-dark.conf") — at server
# start AND on every toggle_theme.sh re-source, which is why the theme never
# actually applied. Deriving the repo root from ~/.tmux.conf's own symlink
# target sidesteps the missing variable entirely.
run-shell 'dots="$(cd "$(dirname "$(readlink "$HOME/.tmux.conf")")/.." && pwd)"; \
  mode="$(cat "${XDG_CONFIG_HOME:-$HOME/.config}/isg/theme" 2>/dev/null)"; \
  [ "$mode" = dark ] || mode=light; \
  tmux source-file "$dots/tmux/theme-$mode.conf"'

# --- plugins (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# Per-socket resurrect state: servers on different sockets (tmux -L name) save
# and restore independently instead of sharing one `last` file and clobbering
# each other. resurrect_dir() (its helpers.sh) only expands $HOME/$HOSTNAME/~,
# not tmux formats, so bake the socket name in here via run-shell — which does
# expand #{...}. #{b:socket_path} is the socket basename (`default`, or the
# `tmux -L name`). Set before any save/restore is triggered.
run 'tmux set -g @resurrect-dir "${XDG_DATA_HOME:-$HOME/.local/share}/tmux/resurrect/#{b:socket_path}"'
# orchbus: prefix o -> cockpit popup to triage/approve all Claude Code sessions
# from one window (scans panes running `claude`, acts via send-keys).
# https://github.com/isdg/orchbus
set -g @plugin 'isdg/orchbus'
# omni: prefix b/a/P/j -> fzf-backed window jump, content search, and pane
# scrollback capture (into less/nvim).
# https://github.com/isdg/omni
set -g @plugin 'isdg/omni'

run '~/.tmux/plugins/tpm/tpm'
